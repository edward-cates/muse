[build]
  command = "npm ci && npm run build -w client"
  publish = "client/dist"

[[redirects]]
  from = "/api/*"
  to = "https://muse-server.fly.dev/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
